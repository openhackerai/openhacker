# cspell:words mktemp softprops
name: OpenHacker Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for example v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS arm64
            binary_path: packages/cli/dist/openhacker
            archive_glob: packages/cli/dist/openhacker-darwin-arm64.zip
          - os: macos-13
            label: macOS x64
            binary_path: packages/cli/dist/openhacker
            archive_glob: packages/cli/dist/openhacker-darwin-x64.zip
          - os: ubuntu-latest
            label: Linux x64
            binary_path: packages/cli/dist/openhacker
            archive_glob: packages/cli/dist/openhacker-linux-x64.tar.gz
          - os: ubuntu-24.04-arm
            label: Linux arm64
            binary_path: packages/cli/dist/openhacker
            archive_glob: packages/cli/dist/openhacker-linux-arm64.tar.gz
          - os: windows-latest
            label: Windows x64
            binary_path: packages/cli/dist/openhacker.exe
            archive_glob: packages/cli/dist/openhacker-windows-x64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build release archive
        run: pnpm --filter @openhacker/cli build:release

      - name: Smoke test local installer
        shell: bash
        run: |
          tmpdir="$(mktemp -d)"
          OPENHACKER_INSTALL_DIR="$tmpdir" ./install --binary "${{ matrix.binary_path }}" --no-modify-path

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-openhacker-release
          path: ${{ matrix.archive_glob }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            dist-artifacts/openhacker-darwin-arm64.zip
            dist-artifacts/openhacker-darwin-x64.zip
            dist-artifacts/openhacker-linux-arm64.tar.gz
            dist-artifacts/openhacker-linux-x64.tar.gz
            dist-artifacts/openhacker-windows-x64.zip
